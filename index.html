// 預設數據（API 抓不到時的備用）
const FALLBACK={WALCL:{value:6719,prev:6700,unit:"十億USD",name:"聯準會資產負債表"},M2SL:{value:21580,prev:21540,unit:"十億USD",name:"M2 貨幣供給"},FEDFUNDS:{value:4.33,prev:4.33,unit:"%",name:"聯邦基金利率"},RRPONTSYD:{value:165,prev:180,unit:"十億USD",name:"隔夜逆回購"},DGS2:{value:3.97,prev:3.95,unit:"%",name:"2Y殖利率"},DGS10:{value:4.48,prev:4.46,unit:"%",name:"10Y殖利率"},VIX:{value:18.43,prev:17.90,unit:"",name:"VIX 恐慌指數"},DXY:{value:99.27,prev:98.60,unit:"",name:"美元指數"},GOLD:{value:4562,prev:4693,unit:"USD/oz",name:"黃金"},BTC_D:{value:58.2,prev:58.4,unit:"%",name:"BTC 主導率"},USDT_D:{value:6.5,prev:6.4,unit:"%",name:"USDT 主導率"},USDC_D:{value:2.8,prev:2.7,unit:"%",name:"USDC 主導率"},date:"2026-05-16"};

function sdelta(v,p,dir){if(!v||!p||p===0)return 0;return Math.max(-1,Math.min(1,((v-p)/Math.abs(p))*100*dir));}
function getScores(d){
  const s=(k,dir)=>sdelta(d[k]?.value,d[k]?.prev,dir);
  const stock=s("VIX",-1)*25+s("DXY",-1)*25+s("DGS10",-1)*25+s("FEDFUNDS",-1)*25;
  const crypto=s("USDT_D",-1)*35+s("BTC_D",-1)*15+s("DXY",-1)*25+s("FEDFUNDS",-1)*25;
  const gold=s("GOLD",1)*55+s("DXY",-1)*25+s("DGS10",-1)*20;
  const n=v=>Math.round(Math.max(-100,Math.min(100,v)));
  return{stock:n(stock),crypto:n(crypto),gold:n(gold)};
}
function getAlloc(scores){
  const BASE={stock:55,gold:35,crypto:10};
  const raw={stock:Math.max(5,BASE.stock+(scores.stock/100)*10),gold:Math.max(5,BASE.gold+(scores.gold/100)*10),crypto:Math.max(5,BASE.crypto+(scores.crypto/100)*10)};
  const t=raw.stock+raw.gold+raw.crypto;
  return{stock:Math.round(raw.stock/t*100),gold:Math.round(raw.gold/t*100),crypto:Math.round(raw.crypto/t*100)};
}
function buildHistory(DATA){
  const seed=n=>{const x=Math.sin(n)*10000;return x-Math.floor(x);};
  const keys=Object.keys(DATA).filter(k=>k!=="date");
  const hist={};
  keys.forEach((k,ki)=>{
    const cur=DATA[k].value,prev=DATA[k].prev,trend=cur-prev;
    const pts=[];
    for(let i=59;i>=0;i--){
      const noise=(seed(ki*100+i)-0.48)*Math.abs(trend||cur*0.006)*4;
      const val=cur-trend*(i/59)+noise*(i/60);
      const d=new Date(DATA.date||new Date());d.setDate(d.getDate()-i);
      pts.push({date:d.toISOString().slice(0,10),value:Math.max(0.01,val)});
    }
    pts[58].value=prev;pts[59].value=cur;hist[k]=pts;
  });
  return hist;
}
function buildScoreHist(hist,DATA){
  return hist.WALCL.slice(1).map((_,i)=>{
    const snap={};
    Object.keys(DATA).filter(k=>k!=="date").forEach(k=>{if(hist[k]?.[i+1]&&hist[k]?.[i])snap[k]={value:hist[k][i+1].value,prev:hist[k][i].value};});
    return{date:hist.WALCL[i+1].date,...getScores(snap)};
  });
}

const GlitchBorder=({color=C.cyan})=>(
  <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,pointerEvents:"none",borderRadius:4}}>
    {[[{top:0,left:0,width:12,height:2},{top:0,left:0,width:2,height:12}],[{top:0,right:0,width:12,height:2},{top:0,right:0,width:2,height:12}],[{bottom:0,left:0,width:12,height:2},{bottom:0,left:0,width:2,height:12}],[{bottom:0,right:0,width:12,height:2},{bottom:0,right:0,width:2,height:12}]].flat().map((s,i)=>(
      <div key={i} style={{position:"absolute",background:color,...s}}/>
    ))}
  </div>
);

  const [pw,setPw]=useState("");const [err,setErr]=useState(false);const [shake,setShake]=useState(false);

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}>
      <div className={shake?"sk fi":"fi"} style={{width:340,position:"relative"}}>
        <div style={{border:`1px solid ${C.cyan}`,borderRadius:4,padding:"40px 32px",background:C.panel,position:"relative",boxShadow:`0 0 30px ${C.cyan}22,inset 0 0 20px ${C.cyan}08`}}>
          <GlitchBorder color={C.cyan}/>
          <div style={{textAlign:"center",marginBottom:32}}>
            <div className="pu" style={{fontSize:10,letterSpacing:6,color:C.pink,marginBottom:8}}>//SYS::ACCESS_REQUIRED</div>
            <div style={{fontSize:22,fontWeight:700,color:C.cyan,letterSpacing:3,fontFamily:"'Rajdhani',sans-serif",textShadow:`0 0 20px ${C.cyan}`}}>MACRO TERMINAL</div>
            <div style={{fontSize:11,color:C.muted,marginTop:6,letterSpacing:2}}>v2.6 // RESTRICTED</div>
          </div>
          <div style={{marginBottom:8,fontSize:10,color:C.muted,letterSpacing:1}}>ENTER PASSKEY:</div>
          <input type="password" placeholder="████████" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&go()}
            style={{width:"100%",padding:"10px 14px",background:"#000",border:`1px solid ${err?C.red:C.dim}`,borderRadius:2,color:C.cyan,fontSize:14,fontFamily:"'Share Tech Mono',monospace",boxSizing:"border-box",marginBottom:6,letterSpacing:3}}/>
          {err&&<div style={{color:C.red,fontSize:11,marginBottom:6,letterSpacing:1}}>//ACCESS DENIED</div>}
          <button onClick={go} style={{width:"100%",padding:"10px",background:"transparent",border:`1px solid ${C.cyan}`,borderRadius:2,color:C.cyan,fontSize:13,fontWeight:700,letterSpacing:3,textShadow:`0 0 10px ${C.cyan}`,boxShadow:`0 0 10px ${C.cyan}33`}}>AUTHENTICATE →</button>
        </div>

}

function Gauge({label,value,color}){
  const pct=(value+100)/200;
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 8px",position:"relative"}}>
      <GlitchBorder color={color}/>
      <div style={{fontSize:16,fontWeight:700,color,fontFamily:"'Share Tech Mono',monospace",marginBottom:6,textShadow:`0 0 10px ${color}88`}}>{value>0?"+":""}{value}</div>
      <div style={{position:"relative",height:6,borderRadius:2,background:"#111",marginBottom:4}}>
        <div style={{position:"absolute",left:"50%",top:-1,width:1,height:8,background:C.dim}}/>
        {value>=0?<div style={{position:"absolute",left:"50%",top:0,width:`${(pct-0.5)*100}%`,height:"100%",background:color,boxShadow:`0 0 6px ${color}`}}/>:<div style={{position:"absolute",right:"50%",top:0,width:`${(0.5-pct)*100}%`,height:"100%",background:color,opacity:.7,boxShadow:`0 0 6px ${color}`}}/>}
        <div style={{position:"absolute",top:-3,left:`${pct*100}%`,transform:"translateX(-50%)",width:5,height:12,borderRadius:1,background:color,boxShadow:`0 0 8px ${color}`}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:C.muted,marginBottom:4}}>
        <span>-100</span><span>0</span><span>+100</span>
      </div>
      <div style={{fontSize:8,color:C.muted,letterSpacing:1}}>{label}</div>
      <div style={{fontSize:8,marginTop:4,padding:"1px 6px",borderRadius:2,display:"inline-block",border:`1px solid ${value>20?C.green:value<-20?C.red:C.yellow}`,color:value>20?C.green:value<-20?C.red:C.yellow}}>
        {value>20?"BULL":value<-20?"BEAR":"NEUTRAL"}
      </div>
    </div>
  );
}

function MiniLine({data,color,h=40}){
  if(!data||data.length<2)return<div style={{height:h,background:"#111",borderRadius:2}}/>;
  const vals=data.map(d=>d.value);const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=data.map((d,i,a)=>{const x=(i/(a.length-1))*220,y=h-((d.value-mn)/rng)*(h-4)-2;return`${x},${y}`;}).join(" ");
  const lastX=220, lastY=h-((data[data.length-1].value-mn)/rng)*(h-4)-2;
  return(<svg width="100%" height={h} viewBox={`0 0 220 ${h}`} preserveAspectRatio="none">
    <polyline points={pts} fill="none" stroke={color} strokeWidth={0.8} strokeLinejoin="round" style={{filter:`drop-shadow(0 0 1px ${color})`}}/>
    <circle cx={lastX} cy={lastY} r={2} fill={color} style={{filter:`drop-shadow(0 0 3px ${color})`}}/>
  </svg>);
}

function Card({name,value,prev,unit,hist,color}){
  const chg=value-prev,pct=prev?(chg/Math.abs(prev))*100:0;
  const dec=unit==="%"?2:unit==="十億USD"?0:unit==="USD/oz"?1:3;
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:12,position:"relative"}}>
      <GlitchBorder color={color}/>
      <div style={{fontSize:9,color:C.muted,marginBottom:4,letterSpacing:1}}>{name}</div>
      <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:6}}>
        <span style={{fontSize:16,fontWeight:700,color,textShadow:`0 0 8px ${color}66`}}>{value.toFixed(dec)}</span>
        <span style={{fontSize:9,color:C.muted}}>{unit}</span>
        <span style={{fontSize:9,color:chg>0?C.green:C.red,marginLeft:"auto"}}>{chg>0?"▲":"▼"}{Math.abs(pct).toFixed(2)}%</span>
      </div>
      <MiniLine data={hist||[]} color={color} h={36}/>
    </div>
  );
}

function Donut({scores}){
  const alloc=getAlloc(scores);
  const items=[{label:"STOCK",v:alloc.stock,color:C.green,base:55,adj:Math.round(scores.stock/100*10)},{label:"GOLD",v:alloc.gold,color:C.yellow,base:35,adj:Math.round(scores.gold/100*10)},{label:"CRYPTO",v:alloc.crypto,color:C.cyan,base:10,adj:Math.round(scores.crypto/100*10)}];
  const total=items.reduce((s,i)=>s+i.v,0)||1;
  const cx=70,cy=70,r=55,ir=33;let cum=-90;
  const slices=items.map(item=>{
    const ang=(item.v/total)*360,sa=cum,ea=cum+ang;cum+=ang;
    const tr=d=>d*Math.PI/180;
    const x1=cx+r*Math.cos(tr(sa)),y1=cy+r*Math.sin(tr(sa)),x2=cx+r*Math.cos(tr(ea)),y2=cy+r*Math.sin(tr(ea));
    const ix1=cx+ir*Math.cos(tr(sa)),iy1=cy+ir*Math.sin(tr(sa)),ix2=cx+ir*Math.cos(tr(ea)),iy2=cy+ir*Math.sin(tr(ea));
    const lg=ang>180?1:0;
    return{...item,d:`M${ix1} ${iy1} L${x1} ${y1} A${r} ${r} 0 ${lg} 1 ${x2} ${y2} L${ix2} ${iy2} A${ir} ${ir} 0 ${lg} 0 ${ix1} ${iy1}Z`};
  });
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:16,position:"relative"}}>
      <GlitchBorder color={C.purple}/>
      <div style={{fontSize:9,color:C.muted,letterSpacing:3,marginBottom:12}}>//CAPITAL_FLOW::ESTIMATE</div>
      <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <svg width={140} height={140} viewBox="0 0 140 140">
          {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} opacity={.75} style={{filter:`drop-shadow(0 0 4px ${s.color})`}}/>)}
          <circle cx={cx} cy={cy} r={ir-2} fill={C.bg}/>
          <text x={cx} y={cy-4} textAnchor="middle" fill={C.muted} fontSize={8} fontFamily="Share Tech Mono,monospace">ALLOC</text>
        </svg>
        <div style={{display:"flex",flexDirection:"column",gap:10,flex:1}}>
          {slices.map((s,i)=>(
            <div key={i}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,background:s.color,boxShadow:`0 0 6px ${s.color}`}}/>
                <span style={{fontSize:11,color:C.text}}>{s.label}</span>
                <span style={{fontSize:18,fontWeight:700,color:s.color,marginLeft:"auto",textShadow:`0 0 10px ${s.color}`}}>{s.v}%</span>
              </div>
              <div style={{fontSize:8,color:C.muted,marginLeft:16}}>BASE:{s.base}% | ADJ:{s.adj>=0?"+":""}{s.adj}%</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ScoreChart({history}){
  if(!history||history.length<2)return null;
  const W=560,H=100;
  const cfg=[{k:"stock",c:C.green,l:"STOCK"},{k:"crypto",c:C.cyan,l:"CRYPTO"},{k:"gold",c:C.yellow,l:"GOLD"}];
  const toPath=k=>history.map((d,i)=>{const x=(i/(history.length-1))*W,y=H/2-(d[k]/100)*(H/2-8);return`${i===0?"M":"L"}${x} ${y}`;}).join(" ");
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:16,marginTop:10,position:"relative"}}>
      <GlitchBorder color={C.dim}/>
      <div style={{fontSize:9,color:C.muted,letterSpacing:3,marginBottom:8}}>//SENTIMENT_HISTORY::60D</div>
      <div style={{display:"flex",gap:14,marginBottom:8}}>
        {cfg.map(({k,c,l})=>(<div key={k} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:14,height:2,background:c,boxShadow:`0 0 4px ${c}`}}/><span style={{fontSize:9,color:C.muted}}>{l}</span></div>))}
      </div>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <line x1={0} y1={H/2} x2={W} y2={H/2} stroke={C.dim} strokeWidth={0.5} strokeDasharray="4 4"/>
        {cfg.map(({k,c})=>{
          const d=toPath(k);
          const last=history[history.length-1];
          const lx=W,ly=H/2-(last[k]/100)*(H/2-8);
          return<g key={k}><path d={d} fill="none" stroke={c} strokeWidth={0.8} strokeLinejoin="round" style={{filter:`drop-shadow(0 0 1px ${c})`}}/><circle cx={lx} cy={ly} r={2.5} fill={c} style={{filter:`drop-shadow(0 0 4px ${c})`}}/></g>;
        })}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
        <span style={{fontSize:8,color:C.dim}}>{history[0]?.date}</span>
        <span style={{fontSize:8,color:C.dim}}>{history[history.length-1]?.date}</span>
      </div>
    </div>
  );
}

function MarketBubbles({scores,DATA}){
  const canvasRef=useRef(null);
  const alloc=getAlloc(scores);
  const markets=[{label:"STOCK",pct:alloc.stock,color:C.green,score:scores.stock},{label:"GOLD",pct:alloc.gold,color:C.yellow,score:scores.gold},{label:"CRYPTO",pct:alloc.crypto,color:C.cyan,score:scores.crypto}];
  const maxPct=Math.max(...markets.map(m=>m.pct));
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;
    // 較小泡泡
    const bubbles=markets.map((m,i)=>{
      const baseR=18+(m.pct/maxPct)*22;
      return{...m,baseR,r:baseR,x:W*(0.18+i*0.32),y:H*0.5,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,phase:Math.random()*Math.PI*2};
    });
    // 神經網絡節點（固定輔助節點）
    const nodes=[
      {x:W*0.5,y:H*0.2,r:4,color:C.dim},
      {x:W*0.5,y:H*0.8,r:4,color:C.dim},
      {x:W*0.08,y:H*0.5,r:3,color:C.dim},
      {x:W*0.92,y:H*0.5,r:3,color:C.dim},
    ];
    let frame=0,raf;
    const draw=()=>{
      ctx.clearRect(0,0,W,H);ctx.fillStyle=C.bg2;ctx.fillRect(0,0,W,H);
      // 網格
      ctx.strokeStyle="#0a0a1e";ctx.lineWidth=0.5;
      for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      frame++;
      // 更新位置
      bubbles.forEach((b,i)=>{
        b.r=b.baseR+Math.sin(frame*0.03+b.phase)*2;
        b.x+=b.vx;b.y+=b.vy;
        if(b.x<b.r+15||b.x>W-b.r-15)b.vx*=-1;
        if(b.y<b.r+15||b.y>H-b.r-15)b.vy*=-1;
        bubbles.forEach((b2,j)=>{if(i===j)return;const dx=b.x-b2.x,dy=b.y-b2.y,dist=Math.sqrt(dx*dx+dy*dy),minD=b.r+b2.r+20;if(dist<minD&&dist>0){const f=(minD-dist)/minD*0.25;b.vx+=dx/dist*f;b.vy+=dy/dist*f;}});
        b.vx*=0.98;b.vy*=0.98;
      });
      // 神經網絡連線：泡泡之間
      bubbles.forEach((b,i)=>{
        bubbles.forEach((b2,j)=>{
          if(j<=i)return;
          const dx=b2.x-b.x,dy=b2.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
          const pulse=Math.sin(frame*0.04+i*1.2)*0.5+0.5;
          const alpha=Math.max(0,(1-dist/400)*0.6*pulse);
          // 連線
          const lg=ctx.createLinearGradient(b.x,b.y,b2.x,b2.y);
          lg.addColorStop(0,b.color+Math.floor(alpha*255).toString(16).padStart(2,"0"));
          lg.addColorStop(1,b2.color+Math.floor(alpha*255).toString(16).padStart(2,"0"));
          ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b2.x,b2.y);
          ctx.strokeStyle=lg;ctx.lineWidth=0.6;ctx.stroke();
          // 脈衝點沿連線移動
          const t=(frame*0.01+i*0.33)%1;
          const px=b.x+dx*t,py=b.y+dy*t;
          ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);
          ctx.fillStyle=b.color+"cc";ctx.shadowColor=b.color;ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;
        });
        // 泡泡到輔助節點連線
        nodes.forEach(n=>{
          const dx=n.x-b.x,dy=n.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
          if(dist>200)return;
          const alpha=Math.max(0,(1-dist/200)*0.25);
          ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(n.x,n.y);
          ctx.strokeStyle=b.color+Math.floor(alpha*255).toString(16).padStart(2,"0");
          ctx.lineWidth=0.4;ctx.stroke();
        });
      });
      // 輔助節點
      nodes.forEach(n=>{
        ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
        ctx.fillStyle=C.dim;ctx.fill();
      });
      // 繪製泡泡
      bubbles.forEach(b=>{
        const glow=ctx.createRadialGradient(b.x,b.y,b.r*0.3,b.x,b.y,b.r*1.2);
        glow.addColorStop(0,b.color+"12");glow.addColorStop(1,"transparent");
        ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.2,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
        const grad=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,0,b.x,b.y,b.r);
        grad.addColorStop(0,b.color+"55");grad.addColorStop(1,b.color+"0a");
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
        ctx.strokeStyle=b.color;ctx.lineWidth=0.8;ctx.shadowColor=b.color;ctx.shadowBlur=3;ctx.stroke();ctx.shadowBlur=0;
        ctx.shadowColor=b.color;ctx.shadowBlur=5;ctx.fillStyle=b.color;ctx.textAlign="center";
        ctx.font=`bold 9px 'Share Tech Mono',monospace`;ctx.fillText(b.label,b.x,b.y-5);
        ctx.font=`bold 12px 'Share Tech Mono',monospace`;ctx.fillText(`${b.pct}%`,b.x,b.y+7);
        ctx.font=`8px 'Share Tech Mono',monospace`;ctx.fillStyle=b.score>=0?C.green:C.red;
        ctx.fillText(`${b.score>=0?"+":""}${b.score}`,b.x,b.y+18);ctx.shadowBlur=0;
      });
      raf=requestAnimationFrame(draw);
    };draw();return()=>cancelAnimationFrame(raf);
  },[]);
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:16,marginBottom:10,position:"relative"}}>
      <GlitchBorder color={C.pink}/>
      <div style={{fontSize:9,color:C.muted,letterSpacing:3,marginBottom:10}}>//MARKET_FLOW::NEURAL_VIZ</div>
      <canvas ref={canvasRef} width={340} height={130} style={{width:"100%",borderRadius:2,border:`1px solid ${C.border}`}}/>
    </div>
  );
}

function IndicatorBubbles({DATA}){
  const canvasRef=useRef(null);
  const items=[{key:"WALCL",label:"WALCL",color:C.green},{key:"M2SL",label:"M2",color:C.green},{key:"FEDFUNDS",label:"RATE",color:C.cyan},{key:"RRPONTSYD",label:"RRP",color:C.cyan},{key:"DGS2",label:"2Y",color:C.purple},{key:"DGS10",label:"10Y",color:C.purple},{key:"VIX",label:"VIX",color:C.red},{key:"DXY",label:"DXY",color:C.orange},{key:"GOLD",label:"GOLD",color:C.yellow},{key:"BTC_D",label:"BTC.D",color:C.orange},{key:"USDT_D",label:"USDT.D",color:C.green},{key:"USDC_D",label:"USDC.D",color:C.cyan}];
  const withChange=items.map(item=>{const d=DATA[item.key];const chg=d?.prev?((d.value-d.prev)/Math.abs(d.prev))*100:0;return{...item,chg,up:chg>=0};});
  const maxAbs=Math.max(...withChange.map(i=>Math.abs(i.chg)),0.01);
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
    // 較小半徑
    const bubbles=withChange.map((item,i)=>{
      const baseR=10+(Math.abs(item.chg)/maxAbs)*16;
      const col=4,colW=W/col,rowH=H/3;
      return{...item,baseR,r:baseR,x:(i%col)*colW+colW/2,y:Math.floor(i/col)*rowH+rowH/2,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,phase:Math.random()*Math.PI*2};
    });
    let frame=0,raf;
    const draw=()=>{
      ctx.clearRect(0,0,W,H);ctx.fillStyle=C.bg2;ctx.fillRect(0,0,W,H);
      ctx.strokeStyle="#0a0a1e";ctx.lineWidth=0.5;
      for(let x=0;x<W;x+=25){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=25){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      frame++;
      bubbles.forEach((b,i)=>{
        b.r=b.baseR+Math.sin(frame*0.04+b.phase)*1.5;b.x+=b.vx;b.y+=b.vy;
        if(b.x<b.r+8||b.x>W-b.r-8)b.vx*=-1;if(b.y<b.r+8||b.y>H-b.r-8)b.vy*=-1;
        bubbles.forEach((b2,j)=>{if(i===j)return;const dx=b.x-b2.x,dy=b.y-b2.y,dist=Math.sqrt(dx*dx+dy*dy),minD=b.r+b2.r+12;if(dist<minD&&dist>0){const f=(minD-dist)/minD*0.35;b.vx+=dx/dist*f;b.vy+=dy/dist*f;}});
        b.vx*=0.97;b.vy*=0.97;
      });
      // 神經網絡連線
      bubbles.forEach((b,i)=>{
        bubbles.forEach((b2,j)=>{
          if(j<=i)return;
          const dx=b2.x-b.x,dy=b2.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
          if(dist>180)return;
          const pulse=Math.sin(frame*0.05+i*0.8)*0.5+0.5;
          const alpha=(1-dist/180)*0.45*pulse;
          const lg=ctx.createLinearGradient(b.x,b.y,b2.x,b2.y);
          const fillC=b.up?b.color:C.red;const fillC2=b2.up?b2.color:C.red;
          lg.addColorStop(0,fillC+Math.floor(alpha*255).toString(16).padStart(2,"0"));
          lg.addColorStop(1,fillC2+Math.floor(alpha*255).toString(16).padStart(2,"0"));
          ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b2.x,b2.y);
          ctx.strokeStyle=lg;ctx.lineWidth=0.5;ctx.stroke();
          // 脈衝點
          const t=((frame*0.012+i*0.25)%1);
          const px=b.x+dx*t,py=b.y+dy*t;
          ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);
          ctx.fillStyle=fillC+"bb";ctx.shadowColor=fillC;ctx.shadowBlur=4;ctx.fill();ctx.shadowBlur=0;
        });
      });
      // 繪製泡泡
      bubbles.forEach(b=>{
        const fillC=b.up?b.color:C.red;
        const glow=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*1.15);
        glow.addColorStop(0,fillC+"10");glow.addColorStop(1,"transparent");
        ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.15,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
        const grad=ctx.createRadialGradient(b.x-b.r*0.25,b.y-b.r*0.25,0,b.x,b.y,b.r);
        grad.addColorStop(0,fillC+"66");grad.addColorStop(1,fillC+"15");
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
        ctx.strokeStyle=fillC;ctx.lineWidth=0.6;ctx.shadowColor=fillC;ctx.shadowBlur=2;ctx.stroke();ctx.shadowBlur=0;
        ctx.fillStyle="#fff";ctx.textAlign="center";
        ctx.font=`bold 7px 'Share Tech Mono',monospace`;ctx.fillText(b.label,b.x,b.y-2);
        ctx.font=`6px 'Share Tech Mono',monospace`;ctx.fillStyle=b.up?C.green:C.red;
        ctx.fillText(`${b.up?"▲":"▼"}${Math.abs(b.chg).toFixed(1)}%`,b.x,b.y+7);
      });
      raf=requestAnimationFrame(draw);
    };draw();return()=>cancelAnimationFrame(raf);
  },[]);
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:16,position:"relative"}}>
      <GlitchBorder color={C.orange}/>
      <div style={{fontSize:9,color:C.muted,letterSpacing:3,marginBottom:10}}>//INDICATOR_DELTA::NEURAL_VIZ</div>
      <canvas ref={canvasRef} width={340} height={200} style={{width:"100%",borderRadius:2,border:`1px solid ${C.border}`}}/>
    </div>
  );
}

                            </text>
                          </g>
                        ))}
                        {/* 曲線 */}
                        <polyline points={pts} fill="none" stroke={c} strokeWidth={0.8} strokeLinejoin="round" style={{filter:`drop-shadow(0 0 1px ${c})`}}/>
                        <circle cx={W-PAD_R} cy={lastY} r={2.5} fill={c} style={{filter:`drop-shadow(0 0 5px ${c})`}}/>
                      </svg>
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:2,paddingLeft:PAD_L}}>
                        <span style={{fontSize:8,color:C.dim}}>{obs[0]?.date}</span>
                        <span style={{fontSize:8,color:C.dim}}>{obs[obs.length-1]?.date}</span>
                      </div>
                    </>}
                  </div>
                );
              })}
            </div>
          );
        })()}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
