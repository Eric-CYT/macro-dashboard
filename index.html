<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const PASSWORD="Ericzone";
const C={bg:"#05050a",bg2:"#0a0a14",panel:"#0d0d1a",border:"#1a1a3a",

const FALLBACK={
  WALCL:{value:6719,prev:6700,unit:"十億USD",name:"聯準會資產負債表"},

  date:"2026-05-16"
};

function sdelta(v,p,dir){if(!v||!p||p===0)return 0;return Math.max(-1,Math.min(1,((v-p)/Math.abs(p))*100*dir));}
function getScores(d){
  const s=(k,dir)=>sdelta(d[k]?.value,d[k]?.prev,dir);
  const stock=s("VIX",-1)*25+s("DXY",-1)*25+s("DGS10",-1)*25+s("FEDFUNDS",-1)*25;
  const crypto=s("USDT_D",-1)*35+s("BTC_D",-1)*15+s("DXY",-1)*25+s("FEDFUNDS",-1)*25;
  const gold=s("GOLD",1)*55+s("DXY",-1)*25+s("DGS10",-1)*20;
  const n=v=>Math.round(Math.max(-100,Math.min(100,v)));
  return{stock:n(stock),crypto:n(crypto),gold:n(gold)};
}
function getAlloc(scores){
  const BASE={stock:55,gold:35,crypto:10};
  const raw={stock:Math.max(5,BASE.stock+(scores.stock/100)*10),gold:Math.max(5,BASE.gold+(scores.gold/100)*10),crypto:Math.max(5,BASE.crypto+(scores.crypto/100)*10)};
  const t=raw.stock+raw.gold+raw.crypto;
  return{stock:Math.round(raw.stock/t*100),gold:Math.round(raw.gold/t*100),crypto:Math.round(raw.crypto/t*100)};
}
function buildHistory(DATA){
  const seed=n=>{const x=Math.sin(n)*10000;return x-Math.floor(x);};
  const keys=Object.keys(DATA).filter(k=>k!=="date");
  const hist={};
  keys.forEach((k,ki)=>{
    const cur=DATA[k].value,prev=DATA[k].prev,trend=cur-prev;
    const pts=[];
    for(let i=59;i>=0;i--){
      const noise=(seed(ki*100+i)-0.48)*Math.abs(trend||cur*0.006)*4;
      const val=cur-trend*(i/59)+noise*(i/60);
      const d=new Date(DATA.date||"2026-05-16");d.setDate(d.getDate()-i);
      pts.push({date:d.toISOString().slice(0,10),value:Math.max(0.01,val)});
    }
    pts[58].value=prev;pts[59].value=cur;hist[k]=pts;
  });
  return hist;
}
function buildScoreHist(hist,DATA){
  return hist.WALCL.slice(1).map((_,i)=>{
    const snap={};
    Object.keys(DATA).filter(k=>k!=="date").forEach(k=>{if(hist[k]?.[i+1]&&hist[k]?.[i])snap[k]={value:hist[k][i+1].value,prev:hist[k][i].value};});
    return{date:hist.WALCL[i+1].date,...getScores(snap)};
  });
}

// ── 高清 Canvas Hook ─────────────────────────────────────
function useHiDpiCanvas(drawFn,deps){
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;
    const dpr=window.devicePixelRatio||1;
    const rect=canvas.getBoundingClientRect();
    const W=rect.width||canvas.offsetWidth||400;
    const H=rect.height||canvas.offsetHeight||300;
    canvas.width=Math.round(W*dpr);
    canvas.height=Math.round(H*dpr);
    canvas.style.width=W+"px";
    canvas.style.height=H+"px";
    const ctx=canvas.getContext("2d");
    ctx.scale(dpr,dpr);
    let raf;
    const loop=()=>{drawFn(ctx,W,H);raf=requestAnimationFrame(loop);};
    loop();
    return()=>cancelAnimationFrame(raf);
  },deps);
  return ref;
}

// ── UI 工具元件 ──────────────────────────────────────────
const GlitchBorder=({color=C.cyan})=>(
  <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,pointerEvents:"none"}}>

function Login({onLogin}){

            <div style={{fontSize:11,color:C.muted,marginTop:6,letterSpacing:2}}>v2.6 // RESTRICTED</div>
          </div>
          <div style={{marginBottom:8,fontSize:10,color:C.muted,letterSpacing:1}}>ENTER PASSKEY:</div>
          <input type="password" placeholder="████████" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&go()}
            style={{width:"100%",padding:"10px 14px",background:"#000",border:`1px solid ${err?C.red:C.dim}`,borderRadius:2,color:C.cyan,fontSize:14,fontFamily:"'Share Tech Mono',monospace",boxSizing:"border-box",marginBottom:6,letterSpacing:3}}/>
          {err&&<div style={{color:C.red,fontSize:11,marginBottom:6,letterSpacing:1}}>//ACCESS DENIED</div>}
          <button onClick={go} style={{width:"100%",padding:"10px",background:"transparent",border:`1px solid ${C.cyan}`,borderRadius:2,color:C.cyan,fontSize:13,fontWeight:700,letterSpacing:3,textShadow:`0 0 10px ${C.cyan}`,boxShadow:`0 0 10px ${C.cyan}33`}}>AUTHENTICATE →</button>
        </div>

  );
}

function Gauge({label,value,color}){
  const pct=(value+100)/200;
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:"12px 10px",position:"relative"}}>
      <GlitchBorder color={color}/>
      <div style={{fontSize:20,fontWeight:700,color,fontFamily:"'Share Tech Mono',monospace",marginBottom:8,textShadow:`0 0 10px ${color}88`}}>{value>0?"+":""}{value}</div>
      <div style={{position:"relative",height:8,borderRadius:2,background:"#111",marginBottom:5}}>
        <div style={{position:"absolute",left:"50%",top:-2,width:1,height:12,background:C.dim}}/>

          :<div style={{position:"absolute",right:"50%",top:0,width:`${(0.5-pct)*100}%`,height:"100%",background:color,opacity:.7,boxShadow:`0 0 6px ${color}`}}/>}
        <div style={{position:"absolute",top:-4,left:`${pct*100}%`,transform:"translateX(-50%)",width:6,height:16,borderRadius:1,background:color,boxShadow:`0 0 8px ${color}`}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.muted,marginBottom:5}}><span>-100</span><span>0</span><span>+100</span></div>
      <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:4}}>{label}</div>
      <div style={{fontSize:9,padding:"2px 8px",borderRadius:2,display:"inline-block",border:`1px solid ${value>20?C.green:value<-20?C.red:C.yellow}`,color:value>20?C.green:value<-20?C.red:C.yellow}}>
        {value>20?"BULL":value<-20?"BEAR":"NEUTRAL"}

  );
}

function Donut({scores}){
  const alloc=getAlloc(scores);
  const items=[{label:"STOCK",v:alloc.stock,color:C.green,base:55,adj:Math.round(scores.stock/100*10)},{label:"GOLD",v:alloc.gold,color:C.yellow,base:35,adj:Math.round(scores.gold/100*10)},{label:"CRYPTO",v:alloc.crypto,color:C.cyan,base:10,adj:Math.round(scores.crypto/100*10)}];
  const total=items.reduce((s,i)=>s+i.v,0)||1;
  const cx=75,cy=75,r=60,ir=36;let cum=-90;
  const slices=items.map(item=>{
    const ang=(item.v/total)*360,sa=cum,ea=cum+ang;cum+=ang;
    const tr=d=>d*Math.PI/180;
    const x1=cx+r*Math.cos(tr(sa)),y1=cy+r*Math.sin(tr(sa)),x2=cx+r*Math.cos(tr(ea)),y2=cy+r*Math.sin(tr(ea));
    const ix1=cx+ir*Math.cos(tr(sa)),iy1=cy+ir*Math.sin(tr(sa)),ix2=cx+ir*Math.cos(tr(ea)),iy2=cy+ir*Math.sin(tr(ea));
    const lg=ang>180?1:0;
    return{...item,d:`M${ix1} ${iy1} L${x1} ${y1} A${r} ${r} 0 ${lg} 1 ${x2} ${y2} L${ix2} ${iy2} A${ir} ${ir} 0 ${lg} 0 ${ix1} ${iy1}Z`};
  });
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:18,position:"relative"}}>
      <GlitchBorder color={C.purple}/>
      <div style={{fontSize:9,color:C.muted,letterSpacing:3,marginBottom:4}}>//CAPITAL_FLOW::ESTIMATE</div>
      <div style={{fontSize:9,color:C.dim,marginBottom:14}}>市值加權基礎（股票55 / 黃金35 / 加密10）± 情緒微調</div>
      <div style={{display:"flex",alignItems:"center",gap:18,flexWrap:"wrap"}}>
        <svg width={150} height={150} viewBox="0 0 150 150">
          {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} opacity={.8} style={{filter:`drop-shadow(0 0 4px ${s.color})`}}/>)}
          <circle cx={cx} cy={cy} r={ir-2} fill={C.bg}/>
          <text x={cx} y={cy+3} textAnchor="middle" fill={C.muted} fontSize={8} fontFamily="Share Tech Mono,monospace">ALLOC</text>
        </svg>
        <div style={{display:"flex",flexDirection:"column",gap:12,flex:1}}>
          {slices.map((s,i)=>(
            <div key={i}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:10,height:10,background:s.color,boxShadow:`0 0 6px ${s.color}`}}/>
                <span style={{fontSize:12,color:C.text}}>{s.label}</span>
                <span style={{fontSize:20,fontWeight:700,color:s.color,fontFamily:"'Share Tech Mono',monospace",marginLeft:"auto",textShadow:`0 0 10px ${s.color}`}}>{s.v}%</span>
              </div>
              <div style={{fontSize:9,color:C.muted,marginLeft:18,marginTop:1}}>BASE:{s.base}% ADJ:{s.adj>=0?"+":""}{s.adj}%</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── 散佈泡泡圖（參考樣板：有座標軸）────────────────────
function ScatterBubbles({DATA,scores}){
  const alloc=getAlloc(scores);
  const frameRef=useRef(0);

  // 市場泡泡資料（x=情緒分數, y=資金佔比, size=市值權重）
  const markets=[
    {id:"stock",label:"STOCK",x:scores.stock,y:alloc.stock,size:55,color:C.green},
    {id:"gold", label:"GOLD", x:scores.gold, y:alloc.gold, size:35,color:C.yellow},
    {id:"crypto",label:"CRYPTO",x:scores.crypto,y:alloc.crypto,size:10,color:C.cyan},
  ];

  // 指標泡泡（x=變化率, y=指標分組位置, size=|變化率|）
  const indItems=[
    {key:"WALCL",label:"WALCL",group:0,color:C.green},
    {key:"M2SL",label:"M2",group:0,color:C.green},
    {key:"FEDFUNDS",label:"RATE",group:1,color:C.cyan},
    {key:"RRPONTSYD",label:"RRP",group:1,color:C.cyan},
    {key:"DGS2",label:"2Y",group:2,color:C.purple},
    {key:"DGS10",label:"10Y",group:2,color:C.purple},
    {key:"VIX",label:"VIX",group:3,color:C.red},
    {key:"DXY",label:"DXY",group:3,color:C.orange},
    {key:"GOLD",label:"GOLD",group:4,color:C.yellow},
    {key:"BTC_D",label:"BTC.D",group:4,color:C.orange},
    {key:"USDT_D",label:"USDT.D",group:5,color:C.green},
    {key:"USDC_D",label:"USDC.D",group:5,color:C.cyan},
  ].map(item=>{
    const d=DATA[item.key];
    const chg=d?.prev?((d.value-d.prev)/Math.abs(d.prev))*100:0;
    return{...item,chg,up:chg>=0};
  });
  const maxChg=Math.max(...indItems.map(i=>Math.abs(i.chg)),0.01);

  // ── 散佈圖 canvas ──
  const drawScatter=useCallback((ctx,W,H)=>{
    frameRef.current++;
    const f=frameRef.current;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=C.bg2;ctx.fillRect(0,0,W,H);

    const PL=50,PR=20,PT=20,PB=40;
    const cW=W-PL-PR,cH=H-PT-PB;

    // 網格
    ctx.strokeStyle=C.border;ctx.lineWidth=0.5;
    for(let i=0;i<=4;i++){
      const x=PL+cW*i/4,y=PT+cH*i/4;
      ctx.beginPath();ctx.moveTo(x,PT);ctx.lineTo(x,PT+cH);ctx.globalAlpha=0.3;ctx.stroke();
      ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+cW,y);ctx.stroke();
      ctx.globalAlpha=1;
    }

    // X 軸（情緒 -100~+100）
    ctx.fillStyle=C.muted;ctx.font=`10px 'Share Tech Mono',monospace`;ctx.textAlign="center";
    [-100,-50,0,50,100].forEach(v=>{
      const x=PL+((v+100)/200)*cW;
      ctx.fillText(v,x,H-8);
      ctx.strokeStyle=C.dim;ctx.lineWidth=0.4;
      ctx.beginPath();ctx.moveTo(x,PT+cH);ctx.lineTo(x,PT+cH+4);ctx.globalAlpha=1;ctx.stroke();
    });
    ctx.fillStyle=C.muted;ctx.font=`9px 'Share Tech Mono',monospace`;ctx.textAlign="center";
    ctx.fillText("SENTIMENT SCORE →",PL+cW/2,H-22);

    // Y 軸（佔比 0~100）
    ctx.textAlign="right";
    [0,25,50,75,100].forEach(v=>{
      const y=PT+cH*(1-v/100);
      ctx.fillStyle=C.muted;ctx.font=`10px 'Share Tech Mono',monospace`;
      ctx.fillText(v+"%",PL-6,y+4);
      ctx.strokeStyle=C.dim;ctx.lineWidth=0.4;
      ctx.beginPath();ctx.moveTo(PL-4,y);ctx.lineTo(PL,y);ctx.stroke();
    });
    ctx.save();ctx.translate(14,PT+cH/2);ctx.rotate(-Math.PI/2);
    ctx.textAlign="center";ctx.fillStyle=C.muted;ctx.font=`9px 'Share Tech Mono',monospace`;
    ctx.fillText("ALLOCATION %",0,0);ctx.restore();

    // 軸線
    ctx.strokeStyle=C.dim;ctx.lineWidth=1;ctx.globalAlpha=1;
    ctx.beginPath();ctx.moveTo(PL,PT);ctx.lineTo(PL,PT+cH);ctx.lineTo(PL+cW,PT+cH);ctx.stroke();
    // X=0 中線
    const x0=PL+((0+100)/200)*cW;
    ctx.strokeStyle=C.dim;ctx.lineWidth=0.8;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(x0,PT);ctx.lineTo(x0,PT+cH);ctx.stroke();
    ctx.setLineDash([]);

    // 神經連線（泡泡之間）
    markets.forEach((a,i)=>markets.forEach((b,j)=>{
      if(j<=i)return;
      const ax=PL+((a.x+100)/200)*cW, ay=PT+cH*(1-a.y/100);
      const bx=PL+((b.x+100)/200)*cW, by=PT+cH*(1-b.y/100);
      const pulse=Math.sin(f*0.03+i)*0.5+0.5;
      const lg=ctx.createLinearGradient(ax,ay,bx,by);
      lg.addColorStop(0,a.color+Math.floor(pulse*80).toString(16).padStart(2,"0"));
      lg.addColorStop(1,b.color+Math.floor(pulse*80).toString(16).padStart(2,"0"));
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
      ctx.strokeStyle=lg;ctx.lineWidth=0.8;ctx.stroke();
      // 脈衝點
      const t=((f*0.008+i*0.4)%1);
      ctx.beginPath();ctx.arc(ax+(bx-ax)*t,ay+(by-ay)*t,2,0,Math.PI*2);
      ctx.fillStyle=a.color+"aa";ctx.shadowColor=a.color;ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;
    }));

    // 繪製泡泡
    markets.forEach(m=>{
      const x=PL+((m.x+100)/200)*cW;
      const y=PT+cH*(1-m.y/100);
      const r=10+(m.size/55)*22+Math.sin(f*0.03)*1.5;

      const glow=ctx.createRadialGradient(x,y,0,x,y,r*1.5);
      glow.addColorStop(0,m.color+"20");glow.addColorStop(1,"transparent");
      ctx.beginPath();ctx.arc(x,y,r*1.5,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();

      const grad=ctx.createRadialGradient(x-r*0.3,y-r*0.3,0,x,y,r);
      grad.addColorStop(0,m.color+"88");grad.addColorStop(1,m.color+"18");
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle=m.color;ctx.lineWidth=1;ctx.shadowColor=m.color;ctx.shadowBlur=6;ctx.stroke();ctx.shadowBlur=0;

      ctx.fillStyle=m.color;ctx.textAlign="center";ctx.shadowColor=m.color;ctx.shadowBlur=8;
      ctx.font=`bold 11px 'Share Tech Mono',monospace`;ctx.fillText(m.label,x,y-4);
      ctx.font=`10px 'Share Tech Mono',monospace`;ctx.fillText(`${m.y}%`,x,y+8);
      ctx.font=`9px 'Share Tech Mono',monospace`;ctx.fillStyle=m.x>=0?C.green:C.red;
      ctx.fillText(`${m.x>=0?"+":""}${m.x}`,x,y+19);ctx.shadowBlur=0;
    });
  },[scores,alloc]);

  const drawIndicator=useCallback((ctx,W,H)=>{
    frameRef.current++;
    const f=frameRef.current;
    ctx.clearRect(0,0,W,H);ctx.fillStyle=C.bg2;ctx.fillRect(0,0,W,H);

    const PL=50,PR=20,PT=20,PB=40;
    const cW=W-PL-PR,cH=H-PT-PB;
    const groups=["FED","RATE","BOND","RISK","ASSET","STABLE"];
    const nG=groups.length;

    // 網格
    ctx.strokeStyle=C.border;ctx.lineWidth=0.5;ctx.globalAlpha=0.3;
    for(let i=0;i<=5;i++){
      const x=PL+cW*i/5;
      ctx.beginPath();ctx.moveTo(x,PT);ctx.lineTo(x,PT+cH);ctx.stroke();
    }
    for(let i=0;i<=4;i++){
      const y=PT+cH*i/4;
      ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+cW,y);ctx.stroke();
    }
    ctx.globalAlpha=1;

    // X 軸（變化率）
    ctx.fillStyle=C.muted;ctx.font=`10px 'Share Tech Mono',monospace`;ctx.textAlign="center";
    const xVals=[-3,-2,-1,0,1,2,3];const xRange=6;
    xVals.forEach(v=>{
      const x=PL+((v+3)/xRange)*cW;
      ctx.fillText(v+"%",x,H-8);
    });
    ctx.fillText("CHANGE % →",PL+cW/2,H-22);

    // Y 軸（分組）
    ctx.textAlign="right";
    groups.forEach((g,i)=>{
      const y=PT+cH*(i+0.5)/nG;
      ctx.fillStyle=C.muted;ctx.font=`9px 'Share Tech Mono',monospace`;
      ctx.fillText(g,PL-6,y+4);
      ctx.strokeStyle=C.dim;ctx.lineWidth=0.3;ctx.globalAlpha=0.4;
      ctx.beginPath();ctx.moveTo(PL,PT+cH*(i+1)/nG);ctx.lineTo(PL+cW,PT+cH*(i+1)/nG);ctx.stroke();
      ctx.globalAlpha=1;
    });

    // 軸線
    ctx.strokeStyle=C.dim;ctx.lineWidth=1;ctx.globalAlpha=1;
    ctx.beginPath();ctx.moveTo(PL,PT);ctx.lineTo(PL,PT+cH);ctx.lineTo(PL+cW,PT+cH);ctx.stroke();
    const x0=PL+(3/xRange)*cW;
    ctx.setLineDash([4,4]);ctx.strokeStyle=C.dim;ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(x0,PT);ctx.lineTo(x0,PT+cH);ctx.stroke();ctx.setLineDash([]);

    // 神經連線
    indItems.forEach((a,i)=>indItems.forEach((b,j)=>{
      if(j<=i)return;
      const chgA=Math.max(-3,Math.min(3,a.chg)),chgB=Math.max(-3,Math.min(3,b.chg));
      const ax=PL+((chgA+3)/xRange)*cW,ay=PT+cH*(a.group+0.5)/nG;
      const bx=PL+((chgB+3)/xRange)*cW,by=PT+cH*(b.group+0.5)/nG;
      const dist=Math.sqrt((ax-bx)**2+(ay-by)**2);if(dist>220)return;
      const pulse=Math.sin(f*0.04+i*0.6)*0.5+0.5;
      const alpha=(1-dist/220)*0.35*pulse;
      const fillA=a.up?a.color:C.red,fillB=b.up?b.color:C.red;
      const lg=ctx.createLinearGradient(ax,ay,bx,by);
      lg.addColorStop(0,fillA+Math.floor(alpha*255).toString(16).padStart(2,"0"));
      lg.addColorStop(1,fillB+Math.floor(alpha*255).toString(16).padStart(2,"0"));
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.strokeStyle=lg;ctx.lineWidth=0.5;ctx.stroke();
      const t=((f*0.01+i*0.2)%1);
      ctx.beginPath();ctx.arc(ax+(bx-ax)*t,ay+(by-ay)*t,1.5,0,Math.PI*2);
      ctx.fillStyle=fillA+"bb";ctx.shadowColor=fillA;ctx.shadowBlur=4;ctx.fill();ctx.shadowBlur=0;
    }));

    // 繪製泡泡
    indItems.forEach(b=>{
      const chgC=Math.max(-3,Math.min(3,b.chg));
      const x=PL+((chgC+3)/xRange)*cW;
      const y=PT+cH*(b.group+0.5)/nG;
      const r=5+(Math.abs(b.chg)/maxChg)*14+Math.sin(f*0.05+b.group)*0.8;
      const fillC=b.up?b.color:C.red;

      const glow=ctx.createRadialGradient(x,y,0,x,y,r*1.4);
      glow.addColorStop(0,fillC+"18");glow.addColorStop(1,"transparent");
      ctx.beginPath();ctx.arc(x,y,r*1.4,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();

      const grad=ctx.createRadialGradient(x-r*0.25,y-r*0.25,0,x,y,r);
      grad.addColorStop(0,fillC+"88");grad.addColorStop(1,fillC+"18");
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle=fillC;ctx.lineWidth=0.8;ctx.shadowColor=fillC;ctx.shadowBlur=3;ctx.stroke();ctx.shadowBlur=0;

      ctx.fillStyle="#fff";ctx.textAlign="center";ctx.shadowColor=fillC;ctx.shadowBlur=5;
      ctx.font=`bold 9px 'Share Tech Mono',monospace`;ctx.fillText(b.label,x,y-2);
      ctx.font=`7px 'Share Tech Mono',monospace`;ctx.fillStyle=b.up?C.green:C.red;
      ctx.fillText(`${b.up?"▲":"▼"}${Math.abs(b.chg).toFixed(1)}%`,x,y+8);ctx.shadowBlur=0;
    });
  },[DATA,scores]);

  const scatterRef=useHiDpiCanvas(drawScatter,[drawScatter]);
  const indRef=useHiDpiCanvas(drawIndicator,[drawIndicator]);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:14,position:"relative"}}>
        <GlitchBorder color={C.pink}/>
        <div style={{fontSize:9,color:C.muted,letterSpacing:3,marginBottom:10}}>//MARKET_FLOW::SCATTER_VIZ | X=情緒分數 Y=資金佔比 SIZE=市值權重</div>
        <canvas ref={scatterRef} style={{width:"100%",height:"260px",borderRadius:2,border:`1px solid ${C.border}`}}/>
      </div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:14,position:"relative"}}>
        <GlitchBorder color={C.orange}/>
        <div style={{fontSize:9,color:C.muted,letterSpacing:3,marginBottom:10}}>//INDICATOR_DELTA::SCATTER_VIZ | X=變化率% Y=指標分組 SIZE=波動幅度</div>
        <canvas ref={indRef} style={{width:"100%",height:"300px",borderRadius:2,border:`1px solid ${C.border}`}}/>
      </div>
    </div>
  );
}

// ── 情緒歷史折線 ─────────────────────────────────────────
function ScoreChart({history}){
  if(!history||history.length<2)return null;
  const W=560,H=100,PL=42,PR=12,PT=8,PB=18;
  const cfg=[{k:"stock",c:C.green,l:"STOCK"},{k:"crypto",c:C.cyan,l:"CRYPTO"},{k:"gold",c:C.yellow,l:"GOLD"}];
  const toPath=k=>history.map((d,i)=>{const x=PL+(i/(history.length-1))*(W-PL-PR),y=H/2-(d[k]/100)*((H-PT-PB)/2);return`${i===0?"M":"L"}${x} ${y}`;}).join(" ");
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:16,marginTop:10,position:"relative"}}>
      <GlitchBorder color={C.dim}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:9,color:C.muted,letterSpacing:3}}>//SENTIMENT_HISTORY::60D</div>
        <div style={{display:"flex",gap:14}}>
          {cfg.map(({k,c,l})=>(<div key={k} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:14,height:2,background:c,boxShadow:`0 0 4px ${c}`}}/><span style={{fontSize:9,color:C.muted}}>{l}</span></div>))}
        </div>
      </div>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <line x1={PL} y1={PT} x2={PL} y2={H-PB} stroke={C.dim} strokeWidth={0.5}/>
        {[50,0,-50].map(v=>{const y=H/2-(v/100)*((H-PT-PB)/2);return<g key={v}>
          <line x1={PL-3} y1={y} x2={PL} y2={y} stroke={C.dim} strokeWidth={0.5}/>
          <text x={PL-5} y={y+3} textAnchor="end" fill={C.dim} fontSize={7} fontFamily="Share Tech Mono,monospace">{v>0?"+":""}{v}</text>
          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke={C.dim} strokeWidth={0.3} strokeDasharray="4 6" opacity={0.5}/>
        </g>;})}
        {cfg.map(({k,c})=>{const last=history[history.length-1];const lx=PL+(W-PL-PR),ly=H/2-(last[k]/100)*((H-PT-PB)/2);return<g key={k}><path d={toPath(k)} fill="none" stroke={c} strokeWidth={0.9} strokeLinejoin="round" style={{filter:`drop-shadow(0 0 1.5px ${c})`}}/><circle cx={lx} cy={ly} r={3} fill={c} style={{filter:`drop-shadow(0 0 5px ${c})`}}/></g>;})}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3,paddingLeft:PL}}>
        <span style={{fontSize:8,color:C.dim}}>{history[0]?.date}</span>
        <span style={{fontSize:8,color:C.dim}}>{history[history.length-1]?.date}</span>
      </div>
    </div>
  );
}

        </div>
        <div style={{textAlign:"right"}}>

            <div style={{fontSize:8,color:C.muted}}>LAST_UPDATE</div>

          </>}

                <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:12,position:"relative"}}>

                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      {cfg.map(({k,c,l})=>(<div key={k} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:12,height:1.5,background:c}}/><span style={{fontSize:8,color:C.muted}}>{l}</span></div>))}

                        <line x1={PL} y1={y} x2={W-PR} y2={y} stroke={C.dim} strokeWidth={0.2} strokeDasharray="4 8" opacity={0.5}/>

                  </div>
                </div>
              );
            })()}

            {/* 各指標曲線 */}
            {CARDS.map(({k,c})=>{
              const obs=HIST[k],d=DATA[k];if(!obs||!d)return null;

              const isExp=expanded[k];

              const steps=isExp?5:3;
              const yTicks=Array.from({length:steps+1},(_,i)=>{
                const v=mn+(mx-mn)*i/steps;

              });

                <div key={k} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px",position:"relative"}}>

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>

                      <span style={{fontSize:10,color:C.muted}}>{d.name}</span>
                      <span style={{fontSize:14,fontWeight:700,color:c,textShadow:`0 0 5px ${c}`,fontFamily:"'Share Tech Mono',monospace"}}>{d.value.toFixed(dec)} {d.unit}</span>
                    </div>
                    <button onClick={()=>toggleExp(k)} style={{background:"transparent",border:`1px solid ${c}`,color:c,fontSize:8,padding:"2px 10px",borderRadius:2,cursor:"pointer",letterSpacing:1}}>
                      {isExp?"[▲ 收起]":"[▼ 展開]"}
                    </button>
                  </div>
                  <div style={{overflow:"hidden",transition:"height 0.3s ease",height:H}}>
                    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
                      <line x1={PL} y1={PT} x2={PL} y2={H-PB} stroke={C.dim} strokeWidth={0.5}/>
                      {yTicks.map(({v,y},i)=>(
                        <g key={i}>
                          <line x1={PL-3} y1={y} x2={PL} y2={y} stroke={C.dim} strokeWidth={0.5}/>
                          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke={C.dim} strokeWidth={0.2} strokeDasharray="3 8" opacity={0.4}/>
                          <text x={PL-5} y={y+3} textAnchor="end" fill={C.dim} fontSize={6.5} fontFamily="Share Tech Mono,monospace">
                            {v>=10000?`${(v/1000).toFixed(0)}k`:v>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(dec>0?1:0)}
                          </text>
                        </g>
                      ))}
                      <polyline points={pts} fill="none" stroke={c} strokeWidth={0.9} strokeLinejoin="round" style={{filter:`drop-shadow(0 0 1.5px ${c})`}}/>
                      <circle cx={W-PR} cy={lastY} r={3} fill={c} style={{filter:`drop-shadow(0 0 5px ${c})`}}/>
                    </svg>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:3,paddingLeft:PL}}>
                    <span style={{fontSize:8,color:C.dim}}>{obs[0]?.date}</span>
                    <span style={{fontSize:8,color:C.dim}}>{obs[obs.length-1]?.date}</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
